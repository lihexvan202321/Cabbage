<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调试页面</title>
</head>
<body>
    <h1>JavaScript 语法检查</h1>
    <div id="result"></div>

    <script src="game.js"></script>
    <script>
        const resultDiv = document.getElementById('result');

        try {
            // 检查 GameState
            if (typeof GameState !== 'undefined') {
                resultDiv.innerHTML += '<p style="color: green;">✓ GameState 已定义</p>';
                resultDiv.innerHTML += '<p>techPoints: ' + GameState.techPoints + '</p>';
                resultDiv.innerHTML += '<p>researchUpgrades: ' + JSON.stringify(GameState.researchUpgrades) + '</p>';
            } else {
                resultDiv.innerHTML += '<p style="color: red;">✗ GameState 未定义</p>';
            }

            // 检查 CONFIG
            if (typeof CONFIG !== 'undefined') {
                resultDiv.innerHTML += '<p style="color: green;">✓ CONFIG 已定义</p>';
                if (CONFIG.RESEARCH_UPGRADES) {
                    resultDiv.innerHTML += '<p>RESEARCH_UPGRADES 数量: ' + CONFIG.RESEARCH_UPGRADES.length + '</p>';
                } else {
                    resultDiv.innerHTML += '<p style="color: red;">✗ RESEARCH_UPGRADES 未定义</p>';
                }
            } else {
                resultDiv.innerHTML += '<p style="color: red;">✗ CONFIG 未定义</p>';
            }

            // 检查函数
            const functions = ['getUpgradeBonuses', 'renderResearchUpgrades', 'purchaseUpgrade', 'executeExperiment', 'executeCulture'];
            functions.forEach(fn => {
                if (typeof window[fn] === 'function') {
                    resultDiv.innerHTML += '<p style="color: green;">✓ ' + fn + ' 函数已定义</p>';
                } else {
                    resultDiv.innerHTML += '<p style="color: red;">✗ ' + fn + ' 函数未定义</p>';
                }
            });

            resultDiv.innerHTML += '<p style="color: green; font-weight: bold; margin-top: 20px;">✓ JavaScript 文件加载成功！</p>';
        } catch (e) {
            resultDiv.innerHTML += '<p style="color: red; font-weight: bold;">✗ 错误: ' + e.message + '</p>';
            resultDiv.innerHTML += '<pre>' + e.stack + '</pre>';
        }
    </script>
</body>
</html>
